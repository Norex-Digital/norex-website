<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 96" width="540" height="96" role="img" aria-label="Norex Logo (Briefkopf)">
  <title>Norex Logo Horizontal (Briefkopf / Email-Header)</title>
  <!-- Symbol kleiner für Briefkopf -->
  <g transform="translate(0,8)">
    <rect x="0" y="0" width="80" height="80" rx="5" ry="5" fill="#0A0A0A"/>
    <text x="40" y="58" text-anchor="middle"
          font-family="'Geist', 'Inter', system-ui, sans-serif"
          font-weight="800" font-size="54" fill="#FFFFFF" letter-spacing="-0.02em">N</text>
    <polygon points="50,0 80,0 80,30 74,34 45,5" fill="#E2231A"/>
  </g>
  <!-- Wortmarke NOREX -->
  <text x="104" y="64"
        font-family="'Geist', 'Inter', system-ui, sans-serif"
        font-weight="700" font-size="52" fill="#0A0A0A" letter-spacing="-0.01em">NOREX</text>
</svg>
