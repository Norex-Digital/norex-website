<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 120" width="460" height="120" role="img" aria-label="Norex Logo (Schwarz, einfarbig)">
  <title>Norex Logo Mono Black (Stempel / Druck einfarbig)</title>
  <!-- Symbol — komplett schwarz, kein roter Akzent -->
  <g transform="translate(0,10)">
    <rect x="0" y="0" width="100" height="100" rx="6" ry="6" fill="#000000"/>
    <text x="50" y="72" text-anchor="middle"
          font-family="'Geist', 'Inter', system-ui, sans-serif"
          font-weight="800" font-size="68" fill="#FFFFFF" letter-spacing="-0.02em">N</text>
    <!-- Slash als schwarze Outline-Markierung statt rot — bleibt erkennbar in Mono -->
    <polygon points="62,0 100,0 100,38 92,42 56,6" fill="#FFFFFF"/>
    <polygon points="62,0 100,0 100,38 92,42 56,6" fill="none" stroke="#000000" stroke-width="2"/>
  </g>
  <text x="128" y="80"
        font-family="'Geist', 'Inter', system-ui, sans-serif"
        font-weight="700" font-size="64" fill="#000000" letter-spacing="-0.01em">NOREX</text>
</svg>
